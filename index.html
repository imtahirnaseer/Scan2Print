<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Scan2Print slides</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Poppins', sans-serif;
        background-color: #000;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
    }

    /* Slider Container */
    .slider-container {
        position: relative;
        width: 100%;
        height: 100vh;
        overflow: hidden;
    }

    /* Slides Wrapper */
    .slides-wrapper {
        display: flex;
        width: 100%;
        height: 100%;
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Individual Slide */
    .slide {
        min-width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
    }

    .slide iframe {
        width: 1280px;
        height: 720px;
        border: none;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        border-radius: 8px;
    }

    /* Navigation Controls - Now vertical on right side */
    .nav-controls {
        position: fixed;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        z-index: 1000;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        background: rgba(11, 30, 59, 0.95);
        padding: 30px 20px;
        border-radius: 20px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        width: 60px;
        min-height: 400px; /* Ensures vertical height for stacking */
    }

    /* Navigation Buttons */
    .nav-btn {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
    }

    .nav-btn:hover {
        background: rgba(255, 153, 51, 0.3);
        border-color: #FF9933;
        transform: scale(1.1);
    }

    .nav-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
    }

    .nav-btn:disabled:hover {
        transform: scale(1);
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.2);
    }

    /* Slide Counter - Adjusted for vertical */
    .slide-counter {
        font-family: 'Montserrat', sans-serif;
        color: white;
        font-size: 14px;
        font-weight: 600;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        padding: 10px 0;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        width: 100%;
    }

    .current-slide {
        color: #FF9933;
        font-size: 20px;
    }

    .total-slides {
        color: #94a3b8;
        font-size: 12px;
    }

    /* Progress Bar - Kept horizontal at top, not moved */
    .progress-bar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        z-index: 1001;
    }

    .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #FF9933 0%, #10B981 100%);
        transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 0 10px rgba(255, 153, 51, 0.5);
    }

    /* Slide Dots - Vertical stack */
    .slide-dots {
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: center;
    }

    .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .dot.active {
        background: #FF9933;
        width: 24px;
        height: 8px;
        border-radius: 4px;
    }

    .dot:hover {
        background: rgba(255, 153, 51, 0.6);
    }

    /* Keyboard Hint */
    .keyboard-hint {
        position: fixed;
        top: 30px;
        right: 30px;
        background: rgba(11, 30, 59, 0.9);
        padding: 15px 25px;
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        font-size: 12px;
        z-index: 1000;
        display: flex;
        align-items: center;
        gap: 15px;
        opacity: 0;
        animation: fadeInOut 3s ease-in-out;
    }

    @keyframes fadeInOut {
        0%, 100% { opacity: 0; }
        10%, 90% { opacity: 1; }
    }

    .key {
        background: rgba(255, 255, 255, 0.1);
        padding: 4px 8px;
        border-radius: 4px;
        font-family: 'Montserrat', sans-serif;
        font-weight: 600;
        font-size: 11px;
    }

    /* Fullscreen Button */
    .fullscreen-btn {
        position: fixed;
        top: 30px;
        left: 30px;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: rgba(11, 30, 59, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        transition: all 0.3s ease;
    }

    .fullscreen-btn:hover {
        background: rgba(255, 153, 51, 0.3);
        border-color: #FF9933;
        transform: scale(1.1);
    }

    .print-btn {
        position: fixed;
        right: 30px;
        bottom: 30px;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: rgba(11, 30, 59, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        transition: all 0.3s ease;
    }

    .print-btn:hover {
        background: rgba(16, 185, 129, 0.35);
        border-color: #10B981;
        transform: scale(1.1);
    }

    /* Loading Animation */
    .loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0B1E3B;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10000;
        transition: opacity 0.5s ease;
    }

    .loading.hidden {
        opacity: 0;
        pointer-events: none;
    }

    .spinner {
        width: 60px;
        height: 60px;
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-top-color: #FF9933;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .loading-text {
        color: white;
        font-family: 'Montserrat', sans-serif;
        font-size: 18px;
        margin-top: 20px;
        letter-spacing: 2px;
    }

    /* Responsive Scaling */
    @media (max-width: 1366px) {
        .slide iframe {
            transform: scale(0.9);
        }
        .nav-controls {
            width: 55px;
            padding: 25px 15px;
            min-height: 350px;
        }
    }

    @media (max-width: 1024px) {
        .slide iframe {
            transform: scale(0.7);
        }
        
        .nav-controls {
            right: 10px;
            width: 50px;
            padding: 20px 10px;
            gap: 15px;
            min-height: 300px;
            border-radius: 15px;
        }
        .nav-btn {
            width: 40px;
            height: 40px;
            font-size: 16px;
        }
        .slide-counter {
            font-size: 12px;
            gap: 3px;
            padding: 8px 0;
        }
        .current-slide {
            font-size: 18px;
        }
        .slide-dots {
            gap: 6px;
        }
    }

    @media (max-width: 768px) {
        .nav-controls {
            display: none; /* Hide vertical nav on very small screens to save space */
        }
        .fullscreen-btn {
            left: 10px;
        }
        .print-btn {
            right: 10px;
            bottom: 10px;
        }
        .keyboard-hint {
            right: 10px;
        }
    }

    @media print {
        @page {
            size: landscape;
            margin: 0;
        }

        html,
        body {
            width: auto;
            height: auto;
            overflow: visible !important;
            background: white;
        }

        .loading,
        .progress-bar,
        .keyboard-hint,
        .fullscreen-btn,
        .print-btn,
        .nav-controls {
            display: none !important;
        }

        .slider-container {
            width: 100%;
            height: auto;
            overflow: visible !important;
        }

        .slides-wrapper {
            display: block !important;
            transform: none !important;
            transition: none !important;
            width: 100% !important;
            height: auto !important;
        }

        .slide {
            min-width: 0 !important;
            width: 100% !important;
            height: 100vh !important;
            page-break-after: always;
            break-after: page;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .slide:last-child {
            page-break-after: auto;
            break-after: auto;
        }

        .slide iframe {
            width: 100vw !important;
            height: 100vh !important;
            transform: none !important;
            box-shadow: none !important;
            border-radius: 0 !important;
        }
    }
</style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Scan2Print Pvt Ltd.</div>
</div>

<!-- Progress Bar - Horizontal at top -->
<div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
</div>

<!-- Fullscreen Button -->
<button class="fullscreen-btn" id="fullscreenBtn" title="Toggle Fullscreen">
    <i class="fa-solid fa-expand"></i>
</button>

<button class="print-btn" id="printBtn" title="Print To PDF">
    <i class="fa-solid fa-print"></i>
</button>

<!-- Slider Container -->
<div class="slider-container">
    <div class="slides-wrapper" id="slidesWrapper">
        <!-- All slides will be loaded here -->
    </div>
</div>

<!-- Navigation Controls - Vertical on right -->
<div class="nav-controls">
    <button class="nav-btn" id="prevBtn" title="Previous Slide">
        <i class="fa-solid fa-chevron-left"></i>
    </button>
    
    <div class="slide-dots" id="slideDots"></div>
    
    <div class="slide-counter">
        <span class="current-slide" id="currentSlide">1</span>
        <span class="total-slides">/ <span id="totalSlides">9</span></span>
    </div>
    
    <button class="nav-btn" id="nextBtn" title="Next Slide">
        <i class="fa-solid fa-chevron-right"></i>
    </button>
</div>

<script>
// Slide data - Convert your HTML files to this structure
const slides = [
    { title: '', file: 'slide-01.html' },
    { title: '', file: 'slide-02.html' },
    { title: '', file: 'slide-03.html' },
    { title: '', file: 'slide-04.html' },
    { title: '', file: 'slide-05.html' },
    { title: '', file: 'slide-06.html' },
    { title: '', file: 'slide-07.html' },
    { title: '', file: 'slide-08.html' },
    { title: '', file: 'slide-09.html' },
    { title: '', file: 'slide-10.html' },
    { title: '', file: 'slide-11.html' },
    { title: '', file: 'slide-12.html' },
];

let currentSlideIndex = 0;
const totalSlides = slides.length;
let slideBeforePrint = 0;

// Initialize
document.addEventListener('DOMContentLoaded', function() {
    loadSlides();
    createDots();
    updateNavigation();
    
    // Hide loading screen
    setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
    }, 1500);
});

// Load all slides
function loadSlides() {
    const wrapper = document.getElementById('slidesWrapper');
    slides.forEach((slide, index) => {
        const slideDiv = document.createElement('div');
        slideDiv.className = 'slide';
        slideDiv.innerHTML = `<iframe src="${slide.file}" title="${slide.title}"></iframe>`;
        wrapper.appendChild(slideDiv);
    });
}

// Create navigation dots
function createDots() {
    const dotsContainer = document.getElementById('slideDots');
    slides.forEach((slide, index) => {
        const dot = document.createElement('div');
        dot.className = 'dot' + (index === 0 ? ' active' : '');
        dot.title = slide.title;
        dot.addEventListener('click', () => goToSlide(index));
        dotsContainer.appendChild(dot);
    });
}

// Navigate to specific slide
function goToSlide(index) {
    if (index < 0 || index >= totalSlides) return;
    
    currentSlideIndex = index;
    const wrapper = document.getElementById('slidesWrapper');
    wrapper.style.transform = `translateX(-${index * 100}%)`;
    
    updateNavigation();
}

// Update navigation state
function updateNavigation() {
    // Update counter
    document.getElementById('currentSlide').textContent = currentSlideIndex + 1;
    document.getElementById('totalSlides').textContent = totalSlides;
    
    // Update progress bar
    const progress = ((currentSlideIndex + 1) / totalSlides) * 100;
    document.getElementById('progressFill').style.width = `${progress}%`;
    
    // Update dots
    document.querySelectorAll('.dot').forEach((dot, index) => {
        dot.classList.toggle('active', index === currentSlideIndex);
    });
    
    // Update buttons
    document.getElementById('prevBtn').disabled = currentSlideIndex === 0;
    document.getElementById('nextBtn').disabled = currentSlideIndex === totalSlides - 1;
}

// Navigation buttons
document.getElementById('prevBtn').addEventListener('click', () => {
    goToSlide(currentSlideIndex - 1);
});

document.getElementById('nextBtn').addEventListener('click', () => {
    goToSlide(currentSlideIndex + 1);
});

// Keyboard navigation
document.addEventListener('keydown', (e) => {
    switch(e.key) {
        case 'ArrowLeft':
        case 'PageUp':
            goToSlide(currentSlideIndex - 1);
            break;
        case 'ArrowRight':
        case 'PageDown':
        case ' ':
            e.preventDefault();
            goToSlide(currentSlideIndex + 1);
            break;
        case 'Home':
            goToSlide(0);
            break;
        case 'End':
            goToSlide(totalSlides - 1);
            break;
    }
});

// Fullscreen toggle
document.getElementById('fullscreenBtn').addEventListener('click', () => {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
        document.querySelector('.fullscreen-btn i').className = 'fa-solid fa-compress';
    } else {
        document.exitFullscreen();
        document.querySelector('.fullscreen-btn i').className = 'fa-solid fa-expand';
    }
});

// Print all slides to PDF-friendly pages
document.getElementById('printBtn').addEventListener('click', () => {
    slideBeforePrint = currentSlideIndex;
    goToSlide(0);
    document.body.classList.add('print-mode');

    // Give browsers a moment to apply print layout before opening print dialog.
    setTimeout(() => {
        window.print();
    }, 250);
});

window.addEventListener('beforeprint', () => {
    slideBeforePrint = currentSlideIndex;
    goToSlide(0);
    document.body.classList.add('print-mode');
});

window.addEventListener('afterprint', () => {
    document.body.classList.remove('print-mode');
    goToSlide(slideBeforePrint);
});

// Touch/Swipe support for mobile
let touchStartX = 0;
let touchEndX = 0;

document.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
});

document.addEventListener('touchend', (e) => {
    touchEndX = e.changedTouches[0].screenX;
    handleSwipe();
});

function handleSwipe() {
    const swipeThreshold = 50;
    const diff = touchStartX - touchEndX;
    
    if (Math.abs(diff) > swipeThreshold) {
        if (diff > 0) {
            // Swipe left - next slide
            goToSlide(currentSlideIndex + 1);
        } else {
            // Swipe right - previous slide
            goToSlide(currentSlideIndex - 1);
        }
    }
}
</script>

</body>
</html>
